<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calm Pieces+ Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Exact match for the soft blue radial background */
            --bg-gradient: radial-gradient(circle at center, #c2e9fb 0%, #a1c4fd 100%);
            --glass: rgba(255, 255, 255, 0.22);
            --glass-border: rgba(255, 255, 255, 0.4);
            
            /* Button gradients from your reference photo */
            --btn-play: linear-gradient(180deg, #9b59b6, #8e44ad);
            --btn-daily: linear-gradient(180deg, #2ecc71, #27ae60);
            --btn-multi: linear-gradient(180deg, #e67e22, #d35400);
        }

        body, html {
          <!-- START PAGE / SPLASH SCREEN -->
<div id="splash-screen" class="screen">
    <div style="font-size: 60px; font-weight: 700; color: white; text-align: center; margin-bottom: 40px;">
        Calm<br>Pieces+
    </div>
    <button class="menu-btn play" style="width: 220px;" onclick="hideSplash()">START GAME</button>
</div>  margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-gradient);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; touch-action: none;
        }

        .screen {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.5s ease, opacity 0.5s;
        }

        .hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(35px);
            border: 1.5px solid var(--glass-border);
            border-radius: 50px;
            padding: 35px;
            width: 300px;
            text-align: center;
            color: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
        }

        h1 { font-size: 42px; margin: 0 0 20px 0; line-height: 0.9; }

        /* Gallery/Photo Selector */
        .gallery-nav {
            display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px;
        }
        .nav-arrow { font-size: 30px; cursor: pointer; user-select: none; padding: 10px; color: white; }
        #main-preview { 
            width: 180px; height: 120px; border-radius: 20px; 
            object-fit: cover; border: 3px solid white; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .menu-btn {
            width: 100%; height: 55px; margin: 10px 0;
            border-radius: 30px; border: none;
            color: white; font-weight: 700; font-size: 16px;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .menu-btn:active { transform: scale(0.95); }

        .play { background: var(--btn-play); }
        .daily { background: var(--btn-daily); }
        .multi { background: var(--btn-multi); }

        #canvas-container { 
            width: 90vw; height: 55vh; 
            background: rgba(0,0,0,0.15); border-radius: 30px; 
            overflow: hidden; margin-top: 20px;
        }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(255,255,255,0.15); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            color: white; font-size: 11px; font-weight: bold;
        }#splash-screen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100; /* Keeps it on top of everything else */
    transition: opacity 0.8s ease, transform 0.8s ease;
}

#splash-screen.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(1.1);
}
    </style>
</head>
<body>

    <!-- SCREEN 1: MENU WITH PHOTO SELECTOR -->
    <div id="screen-menu" class="screen">
        <div class="glass-panel">
            <h1>Calm<br>Pieces+</h1>
            
            <div class="gallery-nav">
                <div class="nav-arrow" onclick="changeImage(-1)">◀</div>
                <img id="main-preview" src="puzzle_image.jpg">
                <div class="nav-arrow" onclick="changeImage(1)">▶</div>
                <!-- PASTE THE NEW CODE RIGHT HERE -->
        <input type="file" id="photo-upload" accept="image/*" style="display:none">
        <button class="menu-btn" style="background: #3498db; margin-bottom: 10px;" onclick="document.getElementById('photo-upload').click()">
            UPLOAD MY PHOTO
        </button>
        <!-- END OF NEW CODE -->

        <button class="menu-btn play" onclick="showScreen('screen-diff')">PLAY</button>
        <button class="menu-btn daily" onclick="showScreen('screen-daily')">DAILY CHALLENGE</button>
    </div>
</div

            <button class="menu-btn play" onclick="showScreen('screen-diff')">PLAY</button>
            <button class="menu-btn daily" onclick="showScreen('screen-daily')">DAILY CHALLENGE</button>
            <button class="menu-btn multi" onclick="showScreen('screen-multi')">MULTIPLAYER</button>
        </div>
    </div>

    <!-- SCREEN 2: DAILY CHALLENGE -->
    <div id="screen-daily" class="screen hidden">
        <div class="glass-panel">
            <h2>Daily Task</h2>
            <p>New challenge in 10:24:36</p>
            <button class="menu-btn daily" onclick="startGame(12, 8)">START TASK</button>
            <button class="menu-btn" style="background:rgba(255,255,255,0.1)" onclick="showScreen('screen-menu')">BACK</button>
        </div>
    </div>

    <!-- SCREEN 3: MULTIPLAYER SEARCH -->
    <div id="screen-multi" class="screen hidden">
        <div class="glass-panel">
            <h2>Searching...</h2>
            <p id="search-text">Finding an opponent online</p>
            <button class="menu-btn multi" onclick="showScreen('screen-menu')">CANCEL</button>
        </div>
    </div>

    <!-- DIFFICULTY SCREEN (UPDATED PIECE COUNTS) -->
    <div id="screen-diff" class="screen hidden">
        <div class="glass-panel">
            <h2 style="margin-bottom: 20px;">Select Difficulty</h2>
            <button class="menu-btn daily" onclick="startGame(10, 5)">50 PIECES (EASY)</button>
            <button class="menu-btn play" onclick="startGame(10, 10)">100 PIECES (MEDIUM)</button>
            <button class="menu-btn multi" onclick="startGame(20, 10)">200 PIECES (HARD)</button>
            <button class="menu-btn extreme" onclick="startGame(20, 20)">400 PIECES (EXPERT)</button>
            <button class="menu-btn" style="background:rgba(255,255,255,0.1)" onclick="showScreen('screen-menu')">BACK</button>
        </div>
    </div>

    <!-- SCREEN 5: GAMEPLAY CANVAS -->
    <div id="screen-game" class="screen hidden">
        <div id="canvas-container"><canvas id="puzzleCanvas"></canvas></div>
        <button class="menu-btn" style="width:150px; background:rgba(0,0,0,0.3); margin-top:20px;" onclick="location.reload()">QUIT GAME</button>
    </div>

    <!-- BOTTOM NAV BAR -->
    <div class="bottom-nav">
        <span>🎵 MUSIC</span>
        <span>🧩 PUZZLES</span>
        <span>🎁 REWARDS</span>
        <span>⚙️ SETTINGS</span>
    </div>

    <script>function hideSplash() {
    // Adds the 'hidden' class to fade out the splash screen
    document.getElementById('splash-screen').classList.add('hidden');
    
    // Ensures the Main Menu is visible (removes 'hidden' if it was there)
    document.getElementById('screen-menu').classList.remove('hidden');
}
       document.getElementById('photo-upload').onchange = function(e) {
    const reader = new FileReader();
    reader.onload = function(event) {
        // This updates the internal game image to your uploaded one
        img.src = event.target.result; 
        // This updates the little preview window on the menu
        document.getElementById('main-preview').src = event.target.result; 
    };
    reader.readAsDataURL(e.target.files[0]);
}; 
        // --- 6 PHOTO OPTIONS ---
        const puzzleList = [
            'puzzle_image.jpg', 
            'puzzle2.jpg', 
            'puzzle3.jpg', 
            'puzzle4.jpg',
            'puzzle5.jpg',
            'puzzle6.jpg'
        ];
        
        let currentIdx = 0;
        const canvas = document.getElementById('puzzleCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.src = puzzleList[currentIdx];

        let pieces = [], grabbed = null, cols, rows, pW, pH;

        // Change photo in the gallery
        function changeImage(dir) {
            currentIdx = (currentIdx + dir + puzzleList.length) % puzzleList.length;
            img.src = puzzleList[currentIdx];
            document.getElementById('main-preview').src = img.src;
        }

        // Screen navigation
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'screen-multi') {
                setTimeout(() => {
                    document.getElementById('search-text').innerText = "Opponent Found!";
                    setTimeout(() => startGame(8, 6), 1000);
                }, 2500);
            }
        }

        // Initialize Puzzle
        function startGame(c, r) {
            cols = c; rows = r;
            canvas.width = window.innerWidth * 0.85;
            canvas.height = window.innerHeight * 0.55;
            pW = canvas.width / cols; pH = canvas.height / rows;
            showScreen('screen-game');
            createPieces();
            animate();
        }

        function createPieces() {
            pieces = [];
            for(let y=0; y<rows; y++) {
                for(let x=0; x<cols; x++) {
                    pieces.push({
                        sx: (x * img.naturalWidth)/cols, sy: (y * img.naturalHeight)/rows,
                        sw: img.naturalWidth/cols, sh: img.naturalHeight/rows,
                        x: Math.random() * (canvas.width - pW), y: Math.random() * (canvas.height - pH),
                        cx: x * pW, cy: y * pH, snapped: false
                    });
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces.forEach(p => {
                ctx.drawImage(img, p.sx, p.sy, p.sw, p.sh, p.x, p.y, pW, pH);
                if(!p.snapped) { 
                    ctx.strokeStyle = "rgba(255,255,255,0.3)"; 
                    ctx.strokeRect(p.x, p.y, pW, pH); 
                }
            });
        }

        // Interaction logic
        canvas.ontouchstart = (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.touches[0].clientX - rect.left;
            const my = e.touches[0].clientY - rect.top;
            for(let i=pieces.length-1; i>=0; i--) {
                let p = pieces[i];
                if(!p.snapped && mx > p.x && mx < p.x + pW && my > p.y && my < p.y + pH) { grabbed = p; return; }
            }
        };

        canvas.ontouchmove = (e) => {
            if(!grabbed) return;
            const rect = canvas.getBoundingClientRect();
            grabbed.x = e.touches[0].clientX - rect.left - pW/2;
            grabbed.y = e.touches[0].clientY - rect.top - pH/2;
            draw(); e.preventDefault();
        };

        canvas.ontouchend = () => {
            if(!grabbed) return;
            if(Math.abs(grabbed.x - grabbed.cx) < 25 && Math.abs(grabbed.y - grabbed.cy) < 25) {
                grabbed.x = grabbed.cx; grabbed.y = grabbed.cy; grabbed.snapped = true;
            }
            grabbed = null;
            if(pieces.every(p => p.snapped)) alert("COMPLETED! ⭐⭐⭐");
        };

        function animate() { draw(); requestAnimationFrame(animate); }
    </script>
</body>
</html>
